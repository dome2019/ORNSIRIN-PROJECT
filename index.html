<style>
  :root{
    --bg:#F6F2EA; --ink:#2B3328; --primary:#4A6741; --primary-dark:#41593A;
    --clay:#B8763E; --slate:#6E8098; --surface:#FCFAF4; --line:#E3DCCB;
    --muted:#9AA08F;
  }
  html,body{ margin:0; background:#EDE7D8; font-family:'Noto Sans Thai','Noto Serif Thai',sans-serif; color:var(--ink); }
  .serif-th{ font-family:'Noto Serif Thai',serif; }
  .phone-scroll::-webkit-scrollbar{ display:none; }
  @keyframes breathe { 0%,100%{ transform:scale(1); opacity:.55; } 50%{ transform:scale(1.18); opacity:.9; } }
  @keyframes breathe2 { 0%,100%{ transform:scale(1); opacity:.35; } 50%{ transform:scale(1.32); opacity:.65; } }
  .listen-ring1{ animation: breathe 3.4s ease-in-out infinite; }
  .listen-ring2{ animation: breathe2 3.4s ease-in-out infinite; animation-delay:.3s; }
  textarea:focus, input:focus { outline: none; }
  .tab-scroll::-webkit-scrollbar{ display:none; }

  /* ---- motion system: เล่นเฉพาะตอนเปลี่ยนหน้า/เปิด overlay จริงเท่านั้น (gate อยู่ใน render) ---- */
  @keyframes screenFwd { from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
  @keyframes screenBack { from{ opacity:0; transform:translateY(-6px); } to{ opacity:1; transform:none; } }
  @keyframes sheetUp { from{ opacity:0; transform:translateY(12px); } to{ opacity:1; transform:none; } }
  @keyframes fadeIn { from{ opacity:0; } to{ opacity:1; } }
  @keyframes dialogIn { from{ opacity:0; transform:scale(.98); } to{ opacity:1; transform:none; } }
  @keyframes exhaleOnce { 0%{ transform:scale(1); } 50%{ transform:scale(1.04); } 100%{ transform:scale(1); } }
  .screen-enter.fwd{ animation: screenFwd .22s cubic-bezier(.32,.72,0,1) both; }
  .screen-enter.back{ animation: screenBack .2s cubic-bezier(.32,.72,0,1) both; }
  .sheet-enter{ animation: sheetUp .26s cubic-bezier(.32,.72,0,1) both; }
  .backdrop-enter{ animation: fadeIn .2s linear both; }
  .dialog-enter{ animation: dialogIn .2s cubic-bezier(.32,.72,0,1) both; }
  .exhale-once{ animation: exhaleOnce .6s ease-in-out 1; }
  .panel-enter{ animation: fadeIn .14s ease both; }
  button:not([disabled]){ transition: transform .12s ease; }
  button:not([disabled]):active{ transform: scale(.97); }
  @media (prefers-reduced-motion: reduce){
    .listen-ring1,.listen-ring2{ animation:none; }
    .screen-enter.fwd,.screen-enter.back,.sheet-enter,.backdrop-enter,.dialog-enter,.exhale-once,.panel-enter{ animation:none; }
    button:not([disabled]){ transition:none; }
    button:not([disabled]):active{ transform:none; }
    #queue-fill{ transition:none !important; }
  }
</style>
</head>

function tomorrowISO(){
  const d = new Date();
  d.setDate(d.getDate() + 1);
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

/* Category config for the tap-to-open item detail + booking flow */
function getItemConfig(category, itemId){
  const configs = {
    maid: { list: maidPlans, staffType: "maid", supportsLocation: false,
      title: i => `แม่บ้าน${i.label}`, sub: i => i.detail, price: i => i.price },
    massage: { list: massagePartners, staffType: "massage", supportsLocation: true, homeSurcharge: 100,
      title: i => i.name, sub: i => `${i.tag} · ${i.mins}`, price: i => i.price },
    icebath: { list: icebathPlans, staffType: "icebath", supportsLocation: true, homeSurcharge: 200,
      title: i => i.label, sub: i => i.detail, price: i => i.price },
    physio: { list: physioPlans, staffType: "physio", supportsLocation: true, homeSurcharge: 0,
      title: i => i.label, sub: i => i.detail, price: i => i.price },
    petcare: { list: petCareServices, staffType: "pet", supportsLocation: false,
      title: i => i.label, sub: i => i.desc, price: i => i.price },
  };
  const cfg = configs[category];
  if (!cfg) return null;
  const item = cfg.list.find(x => x.id === itemId);
  if (!item) return null;
  return { ...cfg, item };
}

function setState(patch){ Object.assign(state, patch); render(); }
function icon(name, size=18, extra=""){ return `<i data-lucide="${name}" style="width:${size}px;height:${size}px" class="${extra}"></i>`; }

const thMonths = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const thDays = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"];

function greetingByHour(){
  const h = new Date().getHours();
  if (h >= 5 && h < 12) return "สวัสดีตอนเช้า";
  if (h >= 12 && h < 17) return "สวัสดีตอนบ่าย";
  return "สวัสดีตอนเย็น";
}

/* วันนัดบนหน้าแรก = พรุ่งนี้ ตรงกับค่าตั้งต้นของหน้าเจาะเลือด (tomorrowISO + 09:00) */
function tomorrowThai(){
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return `${thDays[d.getDay()]} ${d.getDate()} ${thMonths[d.getMonth()]}`;
}

function formatLabSlot(){
  if (!state.labDate) return "";
  const [y, m, d] = state.labDate.split("-").map(Number);
  return `วันที่ ${d} ${thMonths[m - 1]} ${y + 543}${state.labTime ? ` เวลา ${state.labTime} น.` : ""}`;
}

/* ลำดับความลึกของแต่ละหน้า — ใช้ตัดสินทิศทางอนิเมชัน (ไปหน้า = ลอยขึ้น, ถอยกลับ = วางลง) */
const DEPTH = { home: 0, "consult-specialty": 1, lab: 1, meds: 1, lifestyle: 1, "consult-form": 2, queue: 3 };
/* ค่าจาก render รอบก่อน — อนิเมชันจะเล่นก็ต่อเมื่อค่าเหล่านี้เปลี่ยนจริง ไม่ใช่แค่ re-render */
let prevScreen = null, prevModalKey = null, prevLifestyleTab = "maid", prevProgress = 35, prevQueuePos = null;

/* รหัสการจองรันนิ่ง — โชว์ใน sheet รายละเอียดนัดหมาย */
let bookingSeq = 0;
function nextBookingRef(){ bookingSeq += 1; return `OSR-${String(bookingSeq).padStart(4, "0")}`; }

/* คิวเดินเองระหว่างอยู่หน้าคิว เพื่อให้เห็นความคืบหน้าตอนเดโม */
let queueTimer = null;
function startQueueTimer(){
  if (queueTimer) return;
  queueTimer = setInterval(() => {
    if (!state.queue || state.queue.position <= 0) { stopQueueTimer(); return; }
    setState({ queue: { position: state.queue.position - 1, wait: Math.max(0, state.queue.wait - 6) } });
  }, 6000);
}
function stopQueueTimer(){
  if (queueTimer) { clearInterval(queueTimer); queueTimer = null; }
}

const QUEUE_START = 3;

function queueProgress(){
  const q = state.queue || { position: QUEUE_START, wait: 18 };
  return Math.round(35 + (65 * (QUEUE_START - q.position)) / QUEUE_START);
}

      <p class="serif-th mt-3" style="font-size:22px;color:var(--clay)">฿${m.amount.toLocaleString()}</p>
      <button data-payment-confirm class="w-full rounded-full py-3.5 font-medium mt-5" style="background:var(--primary);color:#fff;font-size:14px">ฉันชำระเงินแล้ว</button>
    </div>
  </div>`;
}

/* ---------------- booking success overlay ---------------- */
function successModal(){
  const b = state.bookingSuccess;
  return `
  <div class="absolute inset-0 z-50 flex items-center justify-center p-6" style="background:rgba(43,51,40,0.6);pointer-events:auto">
    <div class="dialog-body rounded-3xl p-6 text-center w-full" style="background:var(--bg)">
      <div class="success-check w-14 h-14 rounded-full mx-auto flex items-center justify-center" style="background:var(--primary)">${icon("check",24)}</div>
      <h2 class="serif-th mt-4" style="font-size:16px">${b.title}</h2>
      <p style="font-size:12px;color:#7A8271" class="mt-1.5 leading-relaxed">${b.detail}</p>
      ${b.amount ? `<p class="serif-th mt-3" style="font-size:18px;color:var(--clay)">฿${b.amount.toLocaleString()}</p>` : ""}
      <button data-success-close class="w-full rounded-full py-3 font-medium mt-5" style="background:var(--primary);color:#fff;font-size:13px">เรียบร้อย</button>
    </div>
  </div>`;
}

/* ---------------- render + events ---------------- */
function render(){
  const app = document.getElementById("app");
  // อนิเมชันเข้าหน้าเล่นเฉพาะตอนเปลี่ยนหน้าจริง — การ re-render ภายในหน้า (ติ๊ก checkbox,
  // เลือกหมอ, สลับสมาชิก, timer คิว) ต้องนิ่งสนิท ไม่งั้นหน้าจะกระพริบซ้ำตอนเดโม
  // ต้องคำนวณก่อนสร้าง HTML เพราะ queueScreen ใช้ prevProgress เป็นจุดตั้งต้นของแถบคิว
  const screenChanged = state.screen !== prevScreen;
  if (screenChanged && state.screen === "queue") prevProgress = queueProgress();

  let html = "";
  if (state.screen === "home") html = homeScreen();
  else if (state.screen === "consult-specialty") html = specialtyScreen();
  else if (state.screen === "consult-form") html = consultForm();
  else if (state.screen === "queue") html = queueScreen();
  else if (state.screen === "lab") html = labScreen();
  else if (state.screen === "meds") html = medsScreen();
  else if (state.screen === "lifestyle") html = lifestyleScreen();
  const dir = screenChanged ? ((DEPTH[state.screen] ?? 0) < (DEPTH[prevScreen] ?? 0) ? "back" : "fwd") : null;
  const keepScroll = screenChanged ? 0 : app.scrollTop;
  const nav = state.screen !== "queue" ? bottomNav() : "";
  // bottomNav อยู่นอก wrapper — ถ้าอยู่ในแล้ว transform ชั่วคราวจะดึงแถบล่างลอยตามอนิเมชัน
  app.innerHTML = (dir ? `<div class="screen-enter ${dir}">${html}</div>` : html) + nav;
  app.scrollTop = keepScroll;

  if (state.screen === "lifestyle" && !screenChanged && state.lifestyleTab !== prevLifestyleTab) {
    const panel = document.getElementById("tab-panel");
    if (panel) panel.classList.add("panel-enter");
  }
  prevLifestyleTab = state.lifestyleTab;

  if (state.screen === "queue") {
    // แถบถูก render ที่ค่าเดิมไว้ก่อน แล้วค่อยดันไปค่าจริงเฟรมถัดไป ให้ transition:width ได้ไหลจริง
    // callback อ่าน data-target จาก element ปัจจุบันเสมอ — idempotent จึงยิงซ้ำได้ ไม่มีค่าเก่ามาทับ
    // มี setTimeout สำรองเพราะ rAF ถูกหยุดยิงตอนแท็บอยู่เบื้องหลัง
    if (document.getElementById("queue-fill")) {
      const settleFill = () => {
        const f = document.getElementById("queue-fill");
        if (f) f.style.width = f.dataset.target + "%";
      };
      requestAnimationFrame(() => requestAnimationFrame(settleFill));
      setTimeout(settleFill, 250);
    }
    if (!screenChanged && state.queue && state.queue.position !== prevQueuePos) {
      const pos = document.getElementById("queue-pos");
      if (pos) pos.classList.add("exhale-once");
    }
    prevProgress = queueProgress();
  }
  prevQueuePos = state.queue ? state.queue.position : null;
  prevScreen = state.screen;

  // หยุดคิวชั่วคราวระหว่าง overlay เปิด — กัน re-render เบื้องหลังมารบกวนอนิเมชันของ modal
  if (state.screen === "queue" && !state.modal && !state.bookingSuccess) startQueueTimer(); else stopQueueTimer();

  document.getElementById("user-bar").innerHTML = userBar();

  const modalRoot = document.getElementById("modal-root");
  const modalKey = state.modal ? state.modal.kind : (state.bookingSuccess ? "success" : null);
  const sameOverlay = modalKey !== null && modalKey === prevModalKey;
  const prevSheetEl = sameOverlay ? modalRoot.querySelector(".sheet-body") : null;
  const keepSheetScroll = prevSheetEl ? prevSheetEl.scrollTop : 0;

  if (state.modal && state.modal.kind === "detail") { modalRoot.style.pointerEvents = "auto"; modalRoot.innerHTML = detailModal(); }
  else if (state.modal && state.modal.kind === "bookingDetail") { modalRoot.style.pointerEvents = "auto"; modalRoot.innerHTML = bookingDetailModal(); }
  else if (state.modal && state.modal.kind === "payment") { modalRoot.style.pointerEvents = "auto"; modalRoot.innerHTML = paymentModal(); }
  else if (state.bookingSuccess) { modalRoot.style.pointerEvents = "auto"; modalRoot.innerHTML = successModal(); }
  else { modalRoot.style.pointerEvents = "none"; modalRoot.innerHTML = ""; }

  if (sameOverlay) {
    // overlay เดิม (เช่น แตะเลือกพนักงานใน sheet) — คืนตำแหน่ง scroll และห้ามเล่นอนิเมชันซ้ำ
    const sheet = modalRoot.querySelector(".sheet-body");
    if (sheet) sheet.scrollTop = keepSheetScroll;
  } else if (modalKey) {
    const overlay = modalRoot.firstElementChild;
    if (overlay) {
      if (prevModalKey === null) overlay.classList.add("backdrop-enter");
      const sheet = overlay.querySelector(".sheet-body");
      if (sheet) sheet.classList.add("sheet-enter");
      const dialog = overlay.querySelector(".dialog-body");
      if (dialog) {
        dialog.classList.add("dialog-enter");
        const check = overlay.querySelector(".success-check");
        if (check) check.classList.add("exhale-once");
      }
    }
  }
  prevModalKey = modalKey;

  // wire up events
  app.querySelectorAll("[data-nav]").forEach(el => el.addEventListener("click", () => {
    const patch = { screen: el.dataset.nav };
    if (el.dataset.setTab) patch.lifestyleTab = el.dataset.setTab;
    setState(patch);
  }));
  const back = app.querySelector("[data-back]");
  if (back) back.addEventListener("click", () => {
    if (state.screen === "consult-specialty") setState({ screen: "home" });
    else if (state.screen === "consult-form") setState({ screen: "consult-specialty" });
    else setState({ screen: "home" });
  });
  app.querySelectorAll("[data-pick-specialty]").forEach(el => el.addEventListener("click", () => setState({ specialty: el.dataset.pickSpecialty })));
  const nextBtn = app.querySelector("[data-next-from-specialty]");
  if (nextBtn) nextBtn.addEventListener("click", () => {
    if (state.specialty) {
      const firstAvail = staffFor("doctor").find(d => d.avail);
      setState({ screen: "consult-form", selectedDoctor: firstAvail ? firstAvail.id : null });
    }
  });

  app.querySelectorAll("[data-doctor]").forEach(el => el.addEventListener("click", () => setState({ selectedDoctor: el.dataset.doctor })));

  const symptomInput = document.getElementById("symptom-input");
  if (symptomInput) symptomInput.addEventListener("input", (e) => {
    state.symptom = e.target.value;
    document.getElementById("char-count").textContent = `${state.symptom.length}/500`;
    const submitBtn = document.getElementById("submit-consult");
    const ok = state.symptom.trim().length >= 5;
    submitBtn.disabled = !ok;
    submitBtn.style.background = ok ? "var(--clay)" : "#DCD5C2";
    submitBtn.style.color = ok ? "#fff" : "var(--muted)";
  });
  const needCertBox = document.getElementById("need-cert");
  if (needCertBox) needCertBox.addEventListener("change", (e) => { state.needCert = e.target.checked; });
  const submitBtn = document.getElementById("submit-consult");
  if (submitBtn) submitBtn.addEventListener("click", () => {
    if (state.symptom.trim().length >= 5) setState({ screen: "queue", queue: { position: QUEUE_START, wait: 18 }, queuePaid: false });
  });

  app.querySelectorAll("[data-test]").forEach(el => el.addEventListener("change", () => {
    const t = el.dataset.test;
    const picked = state.pickedTests.includes(t) ? state.pickedTests.filter(x => x !== t) : [...state.pickedTests, t];
    setState({ pickedTests: picked });
  }));
  const labDate = document.getElementById("lab-date");
  if (labDate) labDate.addEventListener("change", (e) => setState({ labDate: e.target.value }));
  const labTime = document.getElementById("lab-time");
  if (labTime) labTime.addEventListener("change", (e) => setState({ labTime: e.target.value }));

  const labConfirm = app.querySelector("#lab-confirm:not([disabled])");
  if (labConfirm) labConfirm.addEventListener("click", () => {
    setState({ modal: { kind: "payment", amount: labTotal(),
      success: {
        title: "นัดหมายเรียบร้อย",
        detail: `พยาบาลจะไปเจาะเลือดถึงบ้านคุณ ${formatLabSlot()} · แจ้งผลผ่านแอปภายใน 1-2 วัน`,
        amount: labTotal(),
      },
      booking: {
        icon: "droplet",
        title: `เจาะเลือดถึงบ้าน · ${state.pickedTests.length} รายการ`,
        sub: `${formatLabSlot()} · ที่บ้านเลขที่ 12/4`,
        amount: labTotal(),
        details: [
          { label: "รายการตรวจ", value: state.pickedTests.join(" · ") },
          { label: "วันและเวลา", value: formatLabSlot() },
          { label: "สถานที่", value: "บ้านเลขที่ 12/4 โครงการอรสิริน เชียงใหม่" },
          { label: "ผลตรวจ", value: "แจ้งผ่านแอปภายใน 1-2 วัน" },
        ],
      },
    } });
  });

  const otcToggle = app.querySelector("#meds-otc");
  if (otcToggle) otcToggle.addEventListener("click", () => setState({ otcOpen: !state.otcOpen }));
  app.querySelectorAll("[data-otc]").forEach(el => el.addEventListener("change", () => {
    const n = el.dataset.otc;
    const picked = state.pickedOtc.includes(n) ? state.pickedOtc.filter(x => x !== n) : [...state.pickedOtc, n];
    setState({ pickedOtc: picked });
  }));

  const medsConfirm = app.querySelector("#meds-confirm:not([disabled])");
  if (medsConfirm) medsConfirm.addEventListener("click", () => {
    const current = medsByUser[state.currentUser] || [];
    const otcPicked = otcItems.filter(o => state.pickedOtc.includes(o.name));
    const total = current.reduce((acc, m) => acc + m.price, 0) + otcPicked.reduce((a, o) => a + o.price, 0);
    const count = current.length + otcPicked.length;
    setState({ modal: { kind: "payment", amount: total,
      success: {
        title: "สั่งซื้อยาเรียบร้อย",
        detail: `จัดส่งยา ${count} รายการ ถึงบ้านเลขที่ 12/4 ภายใน 24 ชั่วโมง`,
        amount: total,
      },
      booking: {
        icon: "pill",
        title: `จัดส่งยาถึงบ้าน · ${count} รายการ`,
        sub: "ถึงภายใน 24 ชั่วโมง · ที่บ้านเลขที่ 12/4",
        amount: total,
        details: [
          { label: "รายการยา", value: [...current.map(x => x.name), ...otcPicked.map(o => o.name)].join(" · ") },
          { label: "การจัดส่ง", value: "ถึงภายใน 24 ชั่วโมง" },
          { label: "ที่อยู่จัดส่ง", value: "บ้านเลขที่ 12/4 โครงการอรสิริน เชียงใหม่" },
        ],
      },
    } });
  });

  const queuePay = app.querySelector("[data-queue-pay]");
  if (queuePay) queuePay.addEventListener("click", () => {
    const price = state.needCert ? 500 : 400;
    setState({ modal: { kind: "payment", amount: price, queuePay: true, success: {
      title: "ยืนยันคิวเรียบร้อย",
      detail: "เราจะแจ้งเตือนคุณเมื่อใกล้ถึงคิว กรุณาเปิดแอปค้างไว้",
      amount: price,
    } } });
  });

  const queueCall = app.querySelector("[data-queue-call]");
  if (queueCall) queueCall.addEventListener("click", () => {
    const doctor = staffFor("doctor").find(d => d.id === state.selectedDoctor);
    setState({ bookingSuccess: {
      title: "กำลังเชื่อมต่อ VDO call",
      detail: `${doctor ? doctor.name : "แพทย์"} กำลังเข้าห้องสนทนา กรุณาอนุญาตการใช้กล้องและไมโครโฟน`,
      amount: 0,
    } });
  });

  app.querySelectorAll("[data-tab]").forEach(el => el.addEventListener("click", () => setState({ lifestyleTab: el.dataset.tab })));

  // แถบบน — ล็อกอิน / สลับสมาชิก / ออกจากระบบ (อยู่นอก #app จึงต้องหาจาก document)
  const loginForm = document.getElementById("login-form");
  if (loginForm) loginForm.addEventListener("submit", (e) => {
    e.preventDefault();
    setState({ loggedIn: true });
  });
  document.querySelectorAll("[data-user]").forEach(el => el.addEventListener("click", () => setState({ currentUser: el.dataset.user })));
  const logoutBtn = document.querySelector("[data-logout]");
  if (logoutBtn) logoutBtn.addEventListener("click", () => setState({ loggedIn: false, screen: "home" }));

  // เปิดรายละเอียดนัดหมายที่ยืนยันแล้ว (จากการ์ดบนหน้าแรก)
  app.querySelectorAll("[data-booking]").forEach(el => el.addEventListener("click", () => {
    setState({ modal: { kind: "bookingDetail", bookingIndex: +el.dataset.booking } });
  }));

  // open item detail
  app.querySelectorAll("[data-item-category]").forEach(el => el.addEventListener("click", () => {
    const category = el.dataset.itemCategory;
    const itemId = el.dataset.itemId;
    const cfg = getItemConfig(category, itemId);
    setState({ modal: { kind: "detail", category, itemId, location: cfg.supportsLocation ? "center" : null, staffId: null } });
  }));

  // modal interactions
  modalRoot.querySelectorAll("[data-modal-close]").forEach(el => el.addEventListener("click", () => setState({ modal: null })));
  modalRoot.querySelectorAll("[data-modal-location]").forEach(el => el.addEventListener("click", () => {
    setState({ modal: { ...state.modal, location: el.dataset.modalLocation } });
  }));
  modalRoot.querySelectorAll("[data-modal-staff]:not([disabled])").forEach(el => el.addEventListener("click", () => {
    setState({ modal: { ...state.modal, staffId: el.dataset.modalStaff } });
  }));
  const modalPay = modalRoot.querySelector("[data-modal-pay]:not([disabled])");
  if (modalPay) modalPay.addEventListener("click", () => {
    const m = state.modal;
    const cfg = getItemConfig(m.category, m.itemId);
    const priceBase = parseInt(String(cfg.price(cfg.item)).replace(/[^0-9]/g, "")) || 0;
    const surcharge = (cfg.supportsLocation && m.location === "home" && cfg.homeSurcharge) ? cfg.homeSurcharge : 0;
    const total = priceBase + surcharge;
    const staff = staffFor(cfg.staffType).find(s => s.id === m.staffId);
    const locText = m.location === "home" ? " ที่บ้านของคุณ" : m.location === "center" ? " ที่พื้นที่ส่วนกลาง" : "";
    const catIcons = { maid: "sparkles", massage: "sparkle", icebath: "snowflake", physio: "activity", petcare: "paw-print" };
    setState({ modal: { ...m, kind: "payment", amount: total,
      success: {
        title: "จองบริการสำเร็จ",
        detail: `${staff ? staff.name : "ผู้ให้บริการ"} จะให้บริการคุณ${locText}`,
        amount: total,
      },
      booking: {
        icon: catIcons[m.category] || "sparkles",
        title: cfg.title(cfg.item),
        sub: `${staff ? staff.name : "ผู้ให้บริการ"}${locText ? " ·" + locText : ""}`,
        amount: total,
        details: [
          { label: "ผู้ให้บริการ", value: staff ? `${staff.name} · ${staff.role}` : "ผู้ให้บริการ" },
          { label: "สถานที่", value: m.location === "home" ? "ที่บ้านของคุณ (บ้านเลขที่ 12/4)" : m.location === "center" ? "พื้นที่ส่วนกลางโครงการอรสิริน" : "ที่บ้านเลขที่ 12/4 โครงการอรสิริน" },
          { label: "รายละเอียดบริการ", value: cfg.sub(cfg.item) },
        ],
      },
    } });
  });
  const payConfirm = modalRoot.querySelector("[data-payment-confirm]");
  if (payConfirm) payConfirm.addEventListener("click", () => {
    const m = state.modal;
    const patch = { modal: null, bookingSuccess: m.success };
    if (m.booking) patch.bookings = [{ ...m.booking, ref: nextBookingRef() }, ...state.bookings];   // นัดใหม่ขึ้นบนสุดของหน้าแรก
    if (m.queuePay) patch.queuePaid = true;
    setState(patch);
  });
  const bookingCancel = modalRoot.querySelector("[data-booking-cancel]");
  if (bookingCancel) bookingCancel.addEventListener("click", () => {
    const idx = state.modal.bookingIndex;
    setState({
      modal: null,
      bookings: state.bookings.filter((_, i) => i !== idx),
      bookingSuccess: { title: "ยกเลิกนัดหมายแล้ว", detail: "เราจะคืนเงินเต็มจำนวนไปยังช่องทางเดิมภายใน 3-5 วันทำการ", amount: 0 },
    });
  });
  const successClose = modalRoot.querySelector("[data-success-close]");
  if (successClose) successClose.addEventListener("click", () => setState({ bookingSuccess: null }));

  // กันแอปตายทั้งแอปถ้าไฟล์ lucide โหลดไม่สำเร็จ — UI ยังใช้ได้ แค่ไม่มีไอคอน
  if (typeof lucide !== "undefined") lucide.createIcons();
}

render();

/* ย่อเฟรมมือถือให้พอดีจอ — กันแถบเมนูล่างโดนตัดบนจอเตี้ย เช่น โปรเจกเตอร์ 1366x768 */
function fitPhone(){
  const phone = document.getElementById("phone");
  phone.style.zoom = "";                       // วัดขนาดจริงก่อนทุกครั้ง กันคำนวณซ้อนค่าเดิม
  const needed = phone.offsetHeight + 48;      // เฟรม + padding บน-ล่างของหน้า
  const scale = Math.min(1, window.innerHeight / needed);
  if (scale < 1) phone.style.zoom = scale;
}
window.addEventListener("resize", fitPhone);
fitPhone();
</script>
